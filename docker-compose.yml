version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mocktrading-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mockTrading
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mocktrading-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mocktrading-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://admin:password@mongodb:27017/mockTrading?authSource=admin
      - PORT=5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - mocktrading-network
    restart: unless-stopped

networks:
  mocktrading-network:
    driver: bridge

volumes:
  mongodb_data:
